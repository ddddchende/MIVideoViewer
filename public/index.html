<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米摄像头录像查看器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="container">
        <header id="header">
            <h1>📹 小米摄像头录像查看器</h1>
            <button id="settingsBtn" class="settings-btn" title="设置">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </header>
        
        <div class="controls" id="controls">
            <div class="control-group">
                <label>选择摄像头:</label>
                <select id="cameraSelect">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>查看模式:</label>
                <select id="viewMode">
                    <option value="date">按日期查看</option>
                    <option value="all" selected>全部时间线</option>
                </select>
            </div>
            
            <div class="control-group" id="dateGroup">
                <label>选择日期:</label>
                <input type="date" id="dateSelect">
            </div>
            
            <div class="control-group">
                <label>播放速度:</label>
                <select id="playbackSpeed">
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                    <option value="8">8x</option>
                    <option value="16">16x</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>缩放:</label>
                <span id="zoomLevel" class="zoom-level">1x</span>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <span id="videoCount">共 0 个视频</span>
            <span id="totalDuration">总时长: 0 分钟</span>
        </div>
        
        <div class="video-container" id="videoContainer">
            <div class="video-info" id="videoInfo">
                <span id="currentVideoName">未选择视频</span>
                <span id="currentVideoTime"></span>
            </div>
            <div class="video-wrapper" id="videoWrapper">
                <video id="videoPlayerA" style="position:absolute;top:0;left:0;width:100%;height:100%;">
                    您的浏览器不支持视频播放
                </video>
                <video id="videoPlayerB" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none;">
                    您的浏览器不支持视频播放
                </video>
                
                <div class="video-controls" id="videoControls">
                    <button id="playPauseBtn" class="control-btn" title="播放/暂停">
                        <svg id="playIcon" viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" width="24" height="24" style="display:none;">
                            <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button id="fullscreenBtn" class="control-btn" title="全屏">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="timeline-container" id="timelineContainer">
            <h3>时间线 <span id="timelineDate"></span></h3>
            <div class="timeline" id="timeline">
                <div class="timeline-placeholder">请选择摄像头</div>
                <div class="timeline-cursor" id="timelineCursor"></div>
                <div class="timeline-playhead" id="timelinePlayhead"></div>
            </div>
            <div class="time-labels" id="timeLabels"></div>
            <input type="range" id="timelineScroll" class="timeline-scroll" min="0" max="100" value="50">
        </div>
    </div>
    
    <div class="settings-modal-overlay" id="settingsModal">
        <div class="settings-modal">
            <div class="settings-modal-header">
                <h2>设置</h2>
                <button class="settings-modal-close" id="settingsModalClose">&times;</button>
            </div>
            <div class="settings-modal-body">
                <div class="setting-item">
                    <label for="videoBasePath">视频目录路径:</label>
                    <input type="text" id="videoBasePath" placeholder="例如: X:\xiaomi_camera_videos">
                    <p class="setting-hint">修改后需要重启服务器</p>
                </div>
            </div>
            <div class="settings-modal-footer">
                <button class="settings-btn-cancel" id="settingsCancel">取消</button>
                <button class="settings-btn-save" id="settingsSave">保存</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
